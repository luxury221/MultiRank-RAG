services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: multirank-rag-backend:local
    env_file:
      - path: .env
        required: false
    environment:
      RAG_PDF_PARSER: native
      RAG_BACKEND_PIPELINE_MODE: live
      RAG_BACKEND_PIPELINE_VARIANT: V5-live-fullchain
      RAG_BACKEND_CANDIDATE_RETRIEVER: ${RAG_BACKEND_CANDIDATE_RETRIEVER:-lexical}
      RAG_BACKEND_RERANK_RETRIEVER: ${RAG_BACKEND_RERANK_RETRIEVER:-lexical}
      RAG_BACKEND_CANDIDATE_K: ${RAG_BACKEND_CANDIDATE_K:-24}
      RAG_BACKEND_RERANK_K: ${RAG_BACKEND_RERANK_K:-6}
      RAG_BACKEND_MAX_STEPS: ${RAG_BACKEND_MAX_STEPS:-4}
      RAG_BACKEND_VISUAL_DPI: ${RAG_BACKEND_VISUAL_DPI:-100}
      RAG_BACKEND_VISUAL_CAPTION_PROVIDER: ${RAG_BACKEND_VISUAL_CAPTION_PROVIDER:-local}
      RAG_BACKEND_VISUAL_MAX_CAPTIONS: ${RAG_BACKEND_VISUAL_MAX_CAPTIONS:-2}
      RAG_BACKEND_KG_TIMEOUT: ${RAG_BACKEND_KG_TIMEOUT:-60}
      RAG_ANSWER_PROVIDER: ${RAG_ANSWER_PROVIDER:-fallback}
      RAG_BACKEND_ENABLE_KG: ${RAG_BACKEND_ENABLE_KG:-1}
      RAG_LIVE_MAX_PAGES: ${RAG_LIVE_MAX_PAGES:-8}
      RAG_UPLOAD_MAX_MB: ${RAG_UPLOAD_MAX_MB:-20}
      RAG_KG_DIR: outputs/graphrag
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    ports:
      - "8765:8765"
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: multirank-rag-frontend:local
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped
