services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: multirank-rag-backend:local
    env_file:
      - path: .env
        required: false
    environment:
      RAG_PDF_PARSER: native
      RAG_BACKEND_PIPELINE_MODE: quality
      RAG_BACKEND_PIPELINE_VARIANT: V5-docker-local
      RAG_BACKEND_CANDIDATE_RETRIEVER: lexical
      RAG_BACKEND_RERANK_RETRIEVER: lexical
      RAG_VISUAL_CAPTION_PROVIDER: local
      RAG_ANSWER_PROVIDER: fallback
      RAG_BACKEND_ENABLE_KG: "1"
      RAG_KG_DIR: outputs/graphrag
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    ports:
      - "8765:8765"
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: multirank-rag-frontend:local
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped
